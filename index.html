<!DOCTYPE HTML>
<html>
<head>
  <meta charset="UTF-8">
  <title>Main</title>
  <style>body { padding: 0; margin: 0; }</style>
</head>

<body>

<pre id="elm"></pre>

<script src="elm.js"></script>
<script src="sand.js"></script>
<script>
try {
  var app = Elm.Main.init({ node: document.getElementById("elm"), flags: Math.random() });
  if (window.SandSim) { window.SandSim.start(); }

  // Prevent page scroll when playing Asteroids
  var gameFocused = false;
  var gameKeys = {ArrowUp:1, ArrowDown:1, ArrowLeft:1, ArrowRight:1, " ":1, w:1, a:1, s:1, d:1};
  document.addEventListener("click", function(e) {
    var panel = document.getElementById("asteroids-panel");
    gameFocused = panel && panel.contains(e.target);
  }, true);
  document.addEventListener("keydown", function(e) {
    if (gameFocused && gameKeys[e.key]) { e.preventDefault(); }
  });
}
catch (e)
{
  var header = document.createElement("h1");
  header.style.fontFamily = "monospace";
  header.innerText = "Initialization Error";
  var pre = document.getElementById("elm");
  document.body.insertBefore(header, pre);
  pre.innerText = e;
  throw e;
}
</script>

</body>
</html>
